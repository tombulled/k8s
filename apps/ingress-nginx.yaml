project: default
deletion:
  cascade: true
syncPolicy:
  automated:
    prune: true
    selfHeal: true
destination:
  namespace: ingress-nginx
  name: in-cluster
sourcesObject:
  main:
    repoURL: https://kubernetes.github.io/ingress-nginx
    targetRevision: 4.14.3
    chart: ingress-nginx
    helm:
      valueFiles:
        - $values/values/ingress-nginx/values.yaml
  values:
    repoURL: git@github.com:tombulled/k8s.git
    targetRevision: main
    ref: values
