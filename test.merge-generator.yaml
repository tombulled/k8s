apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: test-merge-generator
  namespace: argocd
spec:
  generators:
    - merge:
        mergeKeys:
          - values.selector
        generators:
          - git:
              repoURL: git@github.com:tombulled/k8s.git
              revision: HEAD
              files:
                - path: "apps/test-2/*/values.yaml"
              values:
                selector: "{{.path.path}}"
          - git:
              repoURL: git@github.com:tombulled/k8s.git
              revision: HEAD
              files:
                - path: "apps/test-2/*/values-type-dev.yaml"
          - git:
              repoURL: git@github.com:tombulled/k8s.git
              revision: HEAD
              files:
                - path: "apps/test-2/*/values-t1-dev.yaml"
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  template:
    metadata:
      name: "some-app"
    spec:
      project: default
      sources: []
      destination:
        name: in-cluster
        namespace: "{{.namespace}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
