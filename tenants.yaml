apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: tenants
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: git@github.com:tombulled/k8s.git
        revision: HEAD
        directories:
          - path: "tenants/*"
        values:
          tenant: "{{.path.basename}}"
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  template:
    metadata:
      name: "tenant-{{.values.tenant}}"
    spec:
      project: default
      sources:
        - repoURL: git@github.com:tombulled/k8s.git
          targetRevision: main
          path: charts/app-of-apps
          helm:
            valueFiles:
              - "$k8s/tenants/{{.values.tenant}}/values.yaml"
        - repoURL: git@github.com:tombulled/k8s.git
          targetRevision: main
          ref: k8s
      destination:
        name: in-cluster
        namespace: argocd
      syncPolicy:
        automated:
          prune: false
          selfHeal: true
