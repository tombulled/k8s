# defaults: {}

applications:
  foo: # <-- application "id"
    ### metadata ###
    name: foo # <-- defaults to application ID for apps & filename for appset
    namespace: argocd # <-- defaults to argocd? defaults to release namespace?
    finalizers:
      - "my-custom-finalizer"
    deletion:
      cascade: true # <-- defaults to false
      propagationPolicy: ~ # foreground # | background # <-- defaults to foreground
    annotations:
      is-cool: "true"
    labels:
      likes-fish: "false"
    ### spec ###
    project: default # <-- defaults to "default"
    destination:
      name: in-cluster # <-- defaults to "in-cluster"
      namespace: foo
    ignoreDifferences:
      # for the specified json pointers
      - group: apps
        kind: Deployment
        jsonPointers:
          - /spec/replicas
      - kind: ConfigMap
        jqPathExpressions:
          # Example: Ignore changes to a specific key inside a ConfigMap
          - '.data["config.yaml"]'
      # for the specified managedFields managers
      - group: "*"
        kind: "*"
        managedFieldsManagers:
          - kube-controller-manager
        # Name and namespace are optional. If specified, they must match exactly, these are not glob patterns.
        name: my-deployment
        namespace: my-namespace
    info:
      - name: "Example"
        value: "https://example.com"
    infoObject:
      sourceRepo: "some-repo"
      example: other-example
    revisionHistoryLimit: 0 # <-- defaults to 10
    sourceHydrator:
      drySource:
        repoURL: https://github.com/argoproj/argocd-example-apps.git
        targetRevision: HEAD
        path: guestbook
        # helm, kustomize, directory, and plugin fields are available here.
        # See the source.helm, source.kustomize, source.directory, and source.plugin sections above for details.
      syncSource:
        targetBranch: env/prod
        path: guestbook-hydrated
    source:
      repoURL: https://github.com/argoproj/foo.git
    sources:
      - repoURL: https://github.com/argoproj/foo.git
    sourcesObject:
      main:
        repoURL: https://github.com/argoproj/argocd-example-apps.git # Can point to either a Helm chart repo or a git repo.
        targetRevision: HEAD # For Helm, this refers to the chart version.
        path: guestbook # This has no meaning for Helm charts pulled directly from a Helm repo instead of git.
    syncPolicy:
      syncOptionsObject: # takes precedence
        validate: true

