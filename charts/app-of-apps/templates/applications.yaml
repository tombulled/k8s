{{- range $applicationId, $application := .Values.applications -}}
{{- $applicationName := .name | default $applicationId -}}
{{- $applicationNamespace := .namespace | default "argocd" -}}
{{- include "patcher.sourcesObject" . }}
{{- include "patcher.infoObject" . }}
{{- include "patcher.syncOptionsObject" . }}
{{- include "patcher.deletion" . }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ $applicationName | quote }}
  namespace: {{ $applicationNamespace | quote }}
  {{- with .finalizers }}
  finalizers: {{ . | toYaml | nindent 4 }}
  {{- end }}
  {{- with .annotations }}
  annotations: {{- . | toYaml | nindent 4 }}
  {{- end }}
  {{- with .labels }}
  labels: {{- . | toYaml | nindent 4 }}
  {{- end }}
spec:
  {{- with .destination }}
  destination: {{- . | toYaml | nindent 4 }}
  {{- end -}}
  {{- with .ignoreDifferences }}
  ignoreDifferences: {{- . | toYaml | nindent 4 }}
  {{- end }}
  {{- with .info }}
  info: {{- . | toYaml | nindent 4 }}
  {{- end }}
  {{- with .project }}
  project: {{ . }}
  {{- end -}}
  {{- if ne .revisionHistoryLimit nil }}
  revisionHistoryLimit: {{ .revisionHistoryLimit }}
  {{- end }}
  {{- with .source }}
  source: {{- . | toYaml | nindent 4 }}
  {{- end }}
  {{- with .sourceHydrator }}
  sourceHydrator: {{- . | toYaml | nindent 4}}
  {{- end }}
  {{- with .sources }}
  source: {{- . | toYaml | nindent 4 }}
  {{- end }}
  {{- with .syncPolicy }}
  syncPolicy: {{- . | toYaml | nindent 4 }}
  {{- end }}
{{- end -}}
