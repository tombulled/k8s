{{- range include "namespaces" $ | fromYamlArray }}
---
apiVersion: v1
kind: Namespace
metadata:
  {{- with .annotations }}
  annotations: {{- . | toYaml | nindent 4 }}
  {{- end }}
  {{- with .labels }}
  labels: {{- . | toYaml | nindent 4 }}
  {{- end }}
  name: {{ .name }}
{{- with .finalizers }}
spec:
  finalizers: {{ . | toYaml | nindent 2 }}
{{- end }}
{{- end }}
