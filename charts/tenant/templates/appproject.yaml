{{- range $id, $_ := .Values.projects }}
{{- $data := include "give-me-a-name" (dict "root" $ "id" $id "data" . "defaults" $.Values.projectDefaults) | fromYaml }}

{{- $metadata := dict }}
{{- $metadataKeys := list "annotations" "labels" "name" "namespace" "finalizers" }}

{{- $spec := dict -}}
{{- $specKeys := (list
  "permitOnlyProjectScopedClusters"
  "description"
  "sourceRepos"
  "destinations"
  "clusterResourceWhitelist"
  "clusterResourceBlacklist"
  "namespaceResourceBlacklist"
  "namespaceResourceWhitelist"
  "orphanedResources"
  "roles"
  "syncWindows"
  "signatureKeys"
  "sourceNamespaces"
) }}

{{- range $key := $metadataKeys }}
  {{- with get $data $key }}
    {{- $_ := set $metadata $key . }}
  {{- end }}
{{- end }}

{{- range $key := $specKeys }}
  {{- with get $data $key }}
    {{- $_ := set $spec $key . }}
  {{- end }}
{{- end }}

{{- with $data }}

---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata2: {{ ternary ($metadata | toYaml | nindent 2) "{}" (not (empty $metadata)) }}
spec2: {{ ternary ($spec | toYaml | nindent 2) "{}" (not (empty $spec)) }}
metadata:
  {{- with .annotations }}
  annotations: {{- . | toYaml | nindent 4 }}
  {{- end }}
  {{- with .labels }}
  labels: {{- . | toYaml | nindent 4 }}
  {{- end }}
  name: {{ .name }}
  {{- with .namespace }}
  namespace: {{ . }}
  {{- end }}
  {{- with .finalizers }}
  finalizers: {{- . | toYaml | nindent 4 }}
  {{- end }}
spec:
  {{- if ne .permitOnlyProjectScopedClusters nil }}
  permitOnlyProjectScopedClusters: {{ .permitOnlyProjectScopedClusters }}
  {{- end }}
  {{- with .description }}
  description: {{ . | quote }}
  {{- end }}
  {{- with .sourceRepos }}
  sourceRepos: {{- . | toYaml | nindent 4 }}
  {{- end }}
  {{- with .destinations }}
  destinations: {{- . | toYaml | nindent 4 }}
  {{- end }}
  {{- with .clusterResourceWhitelist }}
  clusterResourceWhitelist: {{- . | toYaml | nindent 4 }}
  {{- end }}
  {{- with .clusterResourceBlacklist }}
  clusterResourceBlacklist: {{- .| toYaml | nindent 4 }}
  {{- end }}
  {{- with .namespaceResourceBlacklist }}
  namespaceResourceBlacklist: {{- . | toYaml | nindent 4 }}
  {{- end }}
  {{- with .namespaceResourceWhitelist }}
  namespaceResourceWhitelist: {{- . | toYaml | nindent 4 }}
  {{- end }}
  {{- with .orphanedResources }}
  orphanedResources: {{- . | toYaml | nindent 4 }}
  {{- end }}
  {{- with .roles }}
  roles: {{- . | toYaml | nindent 4 }}
  {{- end }}
  {{- with .syncWindows }}
  syncWindows: {{- . | toYaml | nindent 4 }}
  {{- end }}
  {{- with .signatureKeys }}
  signatureKeys: {{- . | toYaml | nindent 4 }}
  {{- end }}
  {{- with .sourceNamespaces }}
  sourceNamespaces: {{- . | toYaml | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
