{{- range $id, $_ := .Values.namespaces -}}
{{- $data := include "give-me-a-name" (dict "root" $ "id" $id "data" . "defaults" $.Values.namespaceDefaults) | fromYaml -}}
{{- with $data -}}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .name }}
  {{- with .annotations }}
  annotations: {{- . | toYaml | nindent 4 }}
  {{- end }}
  {{- with .labels }}
  labels: {{- . | toYaml | nindent 4 }}
  {{- end }}
{{- with .finalizers }}
spec:
  finalizers: {{ . | toYaml | nindent 4 }}
{{- end }}
---
{{- end }}
{{- end -}}
