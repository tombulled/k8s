{{- block "sourcesObject" . -}}
  {{- with .sourcesObject -}}
    {{- $sources := $.sources | default list -}}

    {{- range $sourceId, $_ := . -}}
      {{- if eq . nil -}}
        {{- continue -}}
      {{- end -}}

      {{- $enabled := ternary .enabled true (ne .enabled nil) -}}

      {{- if not $enabled -}}
        {{- continue -}}
      {{- end -}}

      {{- $_ := set . "ref" (.ref | default $sourceId) -}}
      {{- $_ := set . "name" (.name | default $sourceId) -}}

      {{- $sources = append $sources . -}}
    {{- end -}}

    {{- $_ := set $ "sources" $sources -}}
  {{- end -}}
{{- end -}}

metadata:
  name: {{ .name }}
  {{- with .namespace }}
  namespace: {{ . }}
  {{- end -}}
  {{- with .finalizers }}
  finalizers: {{ . | toYaml | nindent 4 }}
  {{- end }}
  {{- with .annotations }}
  annotations: {{- . | toYaml | nindent 4 }}
  {{- end }}
  {{- with .labels }}
  labels: {{- . | toYaml | nindent 4 }}
  {{- end }}
spec:
  {{- with .destination }}
  destination: {{- . | toYaml | nindent 4 }}
  {{- end -}}
  {{- with .ignoreDifferences }}
  ignoreDifferences: {{- . | toYaml | nindent 4 }}
  {{- end }}
  {{- with .info }}
  info: {{- . | toYaml | nindent 4 }}
  {{- end }}
  {{- with .project }}
  project: {{ . }}
  {{- end -}}
  {{- if ne .revisionHistoryLimit nil }}
  revisionHistoryLimit: {{ .revisionHistoryLimit }}
  {{- end }}
  {{- with .source }}
  source: {{- . | toYaml | nindent 4 }}
  {{- end }}
  {{- with .sourceHydrator }}
  sourceHydrator: {{- . | toYaml | nindent 4 }}
  {{- end }}
  {{- with .sources }}
  sources: {{- . | toYaml | nindent 4}}
  {{- end }}
  {{- with .syncPolicy }}
  syncPolicy: {{- . | toYaml | nindent 4 }}
  {{- end }}
