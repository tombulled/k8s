{{- define "assert" -}}
{{- if not . -}}f{{- end -}}
{{- end -}}

{{- define "check" -}}
  {{- $metadata := .Values.metadata | default dict -}}
  {{- $deployTo := .Values.deployTo | default dict -}}
  {{- $matchLabels := $deployTo.matchLabels | default dict -}}
  {{- $matchExpressions := $deployTo.matchExpressions | default dict -}}

  {{- range $key, $val := $matchLabels -}}
    {{- template "assert" (eq (index $metadata $key) $val) -}}
  {{- end -}}

  {{- range $expression := $matchExpressions -}}
    {{- $metadataVal := index $metadata $expression.key -}}
    {{- $exists := ne $metadataVal nil -}}

    {{- if eq $expression.operator "In" -}}
      {{- $in := false -}}
      {{- range $value := .values -}}
        {{- if eq $value $metadataVal -}}
          {{- $in = true -}}
        {{- end -}}
      {{- end -}}
      {{- template "assert" $in -}}
    {{- else if eq $expression.operator "NotIn" -}}
      {{- range $value := .values -}}
        {{- template "assert" (ne $value $metadataVal) -}}
      {{- end -}}
    {{- else if eq $expression.operator "Exists" -}}
      {{- template "assert" $exists -}}
    {{- else if eq $expression.operator "DoesNotExist" -}}
      {{- template "assert" (not $exists) -}}
    {{- else -}}
      {{- fail (printf "Invalid operator: %s" $expression.operator) -}}
    {{- end -}}
  {{- end -}}
{{- end -}}

output: {{ include "check" $ | quote }}

# In, NotIn, Exists, and DoesNotExist