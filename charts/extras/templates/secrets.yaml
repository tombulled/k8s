{{- range $id, $_ := .Values.extras.secrets }}
---
apiVersion: v1
kind: Secret
metadata:
  {{- with .annotations }}
  annotations: {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .labels }}
  labels: {{- toYaml . | nindent 4 }}
  {{- end }}
  name: {{ .name | default $id }}
  {{- with .namespace }}
  namespace: {{ . }}
  {{- end }}
{{- with .data }}
data: {{- toYaml . | nindent 2 }}
{{- end }}
{{- if ne .immutable nil }}
immutable: {{ .immutable }}
{{- end }}
{{- with .kind }}
kind: {{ . }}
{{- end }}
{{- with .stringData }}
stringData: {{- toYaml . | nindent 2 }}
{{- end }}
{{- with .type }}
type: {{ . }}
{{- end }}
{{- end }}
