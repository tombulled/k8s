{{- range $id, $_ := .Values.extras.sealedSecrets }}
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  {{- with .annotations }}
  annotations: {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .labels }}
  labels: {{- toYaml . | nindent 4 }}
  {{- end }}
  name: {{ .name | default $id }}
  {{- with .namespace }}
  namespace: {{ . }}
  {{- end }}
spec:
  {{- with .encryptedData }}
  encryptedData: {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .template }}
  template: {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
