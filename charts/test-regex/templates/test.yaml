{{- $values := `{"clusterId": "t1-dev", "clusterType": "dev"}` | fromJson -}}
{{- $inputString := .Values.input | toYaml -}}
{{ range $match := regexFindAll "{{ *\\..*? *}}" $inputString -1 }}
{{ $keys := substr 2 (int (sub (len $match) 2)) $match | trim | substr 1 -1 | splitList "." }}
{{- $obj := $values -}}
{{- range $key := $keys -}}
{{- if or (not $obj) (ne (kindOf $obj) "map") -}}
{{- $obj = "" -}}
{{- break -}}
{{- end -}}
{{- $obj = get $obj $key -}}
{{- end -}}
{{- $inputString = replace $match ($obj | default "") $inputString -}}
{{ end }}

output: |{{- $inputString | nindent 2 -}}
