  #             {{- range $expression := (dig "deployTo" "matchExpressions" list .) -}}
  #               {{- $metadataVal := index $metadata $expression.key -}}
  #               {{- $exists := ne $metadataVal nil -}}

  #               {{- if eq $expression.operator "In" -}}
  #                 {{- $in := false -}}
  #                 {{- range $value := .values -}}
