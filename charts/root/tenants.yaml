  #             {{- end -}}

  #             {{- $_ := set . "keepMe" $valid }}
  #       selector:
  #         matchLabels:
  #           keepMe: "true"
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  template:
    metadata:
      name: "tenant-{{.values.tenant}}"
    spec:
      project: default
      sources:
        - repoURL: git@github.com:tombulled/k8s.git
          targetRevision: main
          path: charts/tenant
          helm:
            ignoreMissingValueFiles: true
            valueFiles:
              - "$k8s/tenants/defaults.yaml"
              - "$k8s/tenants/defaults-type-dev.yaml"
              - "$k8s/tenants/defaults-t1-dev.yaml"
              - "$k8s/{{.path.path}}/values.yaml"
              - "$k8s/{{.path.path}}/values-type-dev.yaml"
              - "$k8s/{{.path.path}}/values-t1-dev.yaml"
            valuesObject:
              metadata:
                tenant: "{{.values.tenant}}"
                clusterId: t1-dev
                clusterType: dev
        - repoURL: git@github.com:tombulled/k8s.git
          targetRevision: main
          ref: k8s
      destination:
        name: in-cluster
        namespace: argocd
      syncPolicy:
        automated:
          prune: false
          selfHeal: true
