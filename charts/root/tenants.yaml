apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: tenants
  namespace: argocd
spec:
  generators:
    # - matrix:
    #     generators:
    #       - list:
    #           elements:
    #             - key: id
    #               value: t1-dev
    #             - key: type
    #               value: dev
      - git:
          repoURL: git@github.com:tombulled/k8s.git # finds 100x tenants
          revision: HEAD
          files:
            - path: "tenants/*/config.yaml"
          values:
            tenant: "{{.path.basename}}"
            keepMe: '{{index .deployTo.matchLabels "type"}}' 
            # keepMe: |
            #   {{- define "assert" -}}
            #   {{- if not . -}}f{{- end -}}
            #   {{- end -}}

            #   {{- define "check" -}}
            #     {{- range $key, $val := (.matchLabels | default dict) -}}
            #       {{- template "assert" (eq (index $metadata $key) $val) -}}
            #     {{- end -}}

            #     {{- range $expression := (.matchExpressions | default list) -}}
            #       {{- $metadataVal := index $metadata $expression.key -}}
            #       {{- $exists := ne $metadataVal nil -}}

            #       {{- if eq $expression.operator "In" -}}
            #         {{- $in := false -}}
            #         {{- range $value := .values -}}
            #           {{- if eq $value $metadataVal -}}
            #             {{- $in = true -}}
            #           {{- end -}}
            #         {{- end -}}
            #         {{- template "assert" $in -}}
            #       {{- else if eq $expression.operator "NotIn" -}}
            #         {{- range $value := .values -}}
            #           {{- template "assert" (ne $value $metadataVal) -}}
            #         {{- end -}}
            #       {{- else if eq $expression.operator "Exists" -}}
            #         {{- template "assert" $exists -}}
            #       {{- else if eq $expression.operator "DoesNotExist" -}}
            #         {{- template "assert" (not $exists) -}}
            #       {{- else -}}
            #         {{- fail (printf "Invalid operator: %s" $expression.operator) -}}
            #       {{- end -}}
            #     {{- end -}}
            #   {{- end -}}

            #   {{- template "check" (.deployTo | default dict) -}}
        selector:
          matchExpressions:
            - key: deployTo.type-dev
              operator: In
              values:
                - "true"
                # - ""
                # - nil
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  template:
    metadata:
      name: "tenant-{{.values.tenant}}"
    spec:
      project: default
      sources:
        - repoURL: git@github.com:tombulled/k8s.git
          targetRevision: main
          path: charts/tenant
          helm:
            ignoreMissingValueFiles: true
            valueFiles:
              - "$k8s/tenants/defaults.yaml"
              - "$k8s/tenants/defaults-type-dev.yaml"
              - "$k8s/tenants/defaults-t1-dev.yaml"
              - "$k8s/tenants/type-all/{{.values.tenant}}/values.yaml"
              - "$k8s/tenants/type-all/{{.values.tenant}}/values-type-dev.yaml"
              - "$k8s/tenants/type-all/{{.values.tenant}}/values-t1-dev.yaml"
              - "$k8s/tenants/type-dev/{{.values.tenant}}/values.yaml"
              - "$k8s/tenants/type-dev/{{.values.tenant}}/values-t1-dev.yaml"
              - "$k8s/tenants/t1-dev/{{.values.tenant}}/values.yaml"
            valuesObject:
              metadata:
                tenant: "{{.values.tenant}}"
                clusterId: t1-dev
                clusterType: dev
        - repoURL: git@github.com:tombulled/k8s.git
          targetRevision: main
          ref: k8s
      destination:
        name: in-cluster
        namespace: argocd
      syncPolicy:
        automated:
          prune: false
          selfHeal: true
