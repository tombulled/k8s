apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: tenants
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: git@github.com:tombulled/k8s.git
        revision: HEAD
        directories:
          - path: "tenants/*"
        values:
          tenant: "{{.path.basename}}"
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  template:
    metadata:
      name: "tenant-{{.values.tenant}}"
    spec:
      project: default
      sources:
        - repoURL: git@github.com:tombulled/k8s.git
          targetRevision: main
          path: charts/tenant
          helm:
            valueFiles:
              - "$k8s/tenants/defaults.yaml"
              - "$k8s/tenants/{{.values.tenant}}/values.yaml"
            valuesObject:
              project:
                name: "{{.values.tenant}}"
                description: "Project for Tenant: {{.values.tenant}}"
              app-of-apps:
                applicationDefaults:
                  project: "{{.values.tenant}}"
                applicationSetDefaults:
                  template:
                    spec:
                      project: "{{.values.tenant}}"
        - repoURL: git@github.com:tombulled/k8s.git
          targetRevision: main
          ref: k8s
      destination:
        name: in-cluster
        namespace: argocd
      syncPolicy:
        automated:
          prune: false
          selfHeal: true
