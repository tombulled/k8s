apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: tenants
  namespace: argocd
spec:
  generators:
    - merge:
        mergeKeys:
          - mergeKey
        generators:
          - git:
              repoURL: git@github.com:tombulled/k8s.git
              revision: HEAD
              files:
                - path: "tenants/*/config.yaml"
              values:
                tenant: "{{.path.basename}}"
                mergeKey: '{{ $_ := set . "mergeKey" .path.path }}'
          - git:
              repoURL: git@github.com:tombulled/k8s.git
              revision: HEAD
              files:
                - path: "tenants/*/config-type-dev.yaml"
              values:
                mergeKey: '{{ $_ := set . "mergeKey" .path.path }}'
          - git:
              repoURL: git@github.com:tombulled/k8s.git
              revision: HEAD
              files:
                - path: "tenants/*/config-t1-dev.yaml"
              values:
                mergeKey: '{{ $_ := set . "mergeKey" .path.path }}'
      selector:
        matchExpressions:
          - key: enabled
            operator: NotIn
            values:
              - "false"
