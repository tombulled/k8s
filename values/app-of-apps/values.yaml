defaults:
  project: default
  deletion:
    cascade: true
  destination:
    name: in-cluster
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
  sourcesObject:
    values:
      repoURL: git@github.com:tombulled/k8s.git
      targetRevision: main
      ref: values

applications:
  argo-cd:
    destination:
      namespace: argocd
    sourcesObject:
      main:
        repoURL: https://argoproj.github.io/argo-helm
        chart: argo-cd
        targetRevision: 9.4.3
        helm:
          valueFiles:
            - $values/values/argo-cd/values.yaml
    syncPolicy:
      syncOptionsObject:
        serverSideApply: true

  ingress-nginx:
    destination:
      namespace: ingress-nginx
    sourcesObject:
      main:
        repoURL: https://kubernetes.github.io/ingress-nginx
        targetRevision: 4.14.3
        chart: ingress-nginx
        helm:
          valueFiles:
            - $values/values/ingress-nginx/values.yaml

applicationSetDefaults:
  generators: []
  template:
    metadata: {}
    spec:
      project: default
      destination: {}

applicationSets:
  core:
    goTemplate: true
    # goTemplateOptions: ["missingkey=error"]
    generators:
      - git:
          repoURL: git@github.com:tombulled/k8s.git
          revision: main
          files:
            - path: "apps/*.yaml"
    template:
      metadata:
        # name: "{{.path.basename}}"
        labels:
          path-path: "{{.path.path}}"
          path-basename: "{{.path.basename}}"
          path-basename-normalised: "{{.path.basenameNormalized}}"
          path-filename: "{{.path.filename}}"
          path-filename-normalised: "{{.path.filenameNormalized}}"
          name: "{{.name}}"
      spec:
        project: default
        destination: {}
    templatePatch: |
      {{- $applicationId := (.path.filename | split ".")._0 -}}
      metadata:
        name: {{ .name | default $applicationId }}
