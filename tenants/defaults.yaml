common:
  metadata:
    tenant: ~ # populated by appset
  namespace: "{{.metadata.tenant}}"

projectDefaults:
  namespace: argocd
  namePrefix: "{{.metadata.tenant}}"
  finalizers:
    # Finalizer that ensures that project is not deleted until it is not referenced by any application
    - resources-finalizer.argocd.argoproj.io
  sourceRepos:
    - "*"
  sourceNamespaces:
    - "{{.metadata.tenant}}"

projects:
  main:
    namePrefix: ~
    name: "{{.metadata.tenant}}"
    destinations:
      - namespace: "{{.metadata.tenant}}"
        name: in-cluster

namespaceDefaults:
  namePrefix: "{{.metadata.tenant}}"

namespaces:
  main:
    namePrefix: ~
    name: "{{.metadata.tenant}}"

applicationDefaults:
  project: "{{.metadata.tenant}}"
  deletion:
    cascade: true
  destination:
    name: in-cluster
    namespace: "{{.metadata.tenant}}"
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
  sourcesObject:
    values:
      repoURL: git@github.com:tombulled/k8s.git
      targetRevision: main
      ref: values

applicationSetDefaults:
  namePrefix: "{{.metadata.tenant}}"
  template:
    spec:
      project: "{{.metadata.tenant}}"

applicationSets:
  main:
    namePrefix: ~
    name: "{{.metadata.tenant}}"
    generatorsObject:
      main:
        x-git:
          repoURL: git@github.com:tombulled/k8s.git
          revision: HEAD
          path: "apps/{{.metadata.tenant}}/*"
          valueFiles:
            - values.yaml
            - values-type-{{.metadata.clusterType}}.yaml
            - values-{{.metadata.clusterId}}.yaml
        selector:
          matchExpressions:
            - key: enabled
              operator: NotIn
              values:
                - "false"

networkPolicies:
  default-deny-all:
    podSelector: {}
    policyTypes:
      - Ingress
      - Egress
  default-allow-dns:
    podSelector: {}
    policyTypes:
      - Egress
    egress:
      - to:
          - namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: kube-system
            podSelector:
              matchLabels:
                k8s-app: kube-dns
        ports:
          - protocol: UDP
            port: 53
