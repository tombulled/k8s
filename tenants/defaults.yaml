project:
  finalizers:
    # Finalizer that ensures that project is not deleted until it is not referenced by any application
    - resources-finalizer.argocd.argoproj.io
  sourceRepos:
    - "*" # git@github.com:tombulled/k8s.git?
  destinations: []
  clusterResourceWhitelist:
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
    - group: networking.k8s.io
      kind: IngressClass
  namespaceResourceBlacklist: []
  namespaceResourceWhitelist: []
  roles: []
  syncWindows: []
  sourceNamespaces: []

app-of-apps:
  applicationDefaults:
    # project: default
    deletion:
      cascade: true
    destination:
      name: in-cluster
    syncPolicy:
      automated:
        prune: true
        selfHeal: true
    sourcesObject:
      values:
        repoURL: git@github.com:tombulled/k8s.git
        targetRevision: main
        ref: values

  applicationSetDefaults:
    generators: []
    template:
      metadata: {}
      spec:
        # project: default
        destination: {}
