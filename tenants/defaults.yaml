metadata:
  tenant: ~ # populated by appset

projectDefaults:
  namePrefix: "{{.metadata.tenant}}"
  finalizers:
    # Finalizer that ensures that project is not deleted until it is not referenced by any application
    - resources-finalizer.argocd.argoproj.io
  sourceRepos:
    - "*"

projects:
  main:
    namePrefix: ~
    name: "{{.metadata.tenant}}"
    destinations:
      - namespace: "{{.metadata.tenant}}"
        name: in-cluster

namespaceDefaults:
  namePrefix: "{{.metadata.tenant}}"

namespaces:
  main:
    namePrefix: ~
    name: "{{.metadata.tenant}}"

applicationDefaults:
  namePrefix: "{{.metadata.tenant}}"
  namespace: "{{.metadata.tenant}}"
  project: "{{.metadata.tenant}}"
  deletion:
    cascade: true
  destination:
    name: in-cluster
    namespace: "{{.metadata.tenant}}"
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
  sourcesObject:
    values:
      repoURL: git@github.com:tombulled/k8s.git
      targetRevision: main
      ref: values

applicationSetDefaults:
  namePrefix: "{{.metadata.tenant}}"
  template:
    spec:
      project: "{{.metadata.tenant}}"

applicationSets:
  main:
    namePrefix: ~
    name: "{{.metadata.tenant}}"
