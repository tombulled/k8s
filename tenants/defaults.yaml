common:
  metadata:
    tenant: ~ # populated by appset
  namespace: "{{.metadata.tenant}}"

projectDefaults:
  namespace: argocd
  name: "{{.metadata.tenant}}-{{.id}}"
  # Finalizer that ensures that project is not deleted until it is not referenced by any application
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  sourceRepos:
    - "*"

projects:
  main:
    name: "{{.metadata.tenant}}"
    sourceNamespaces:
      - "{{.metadata.tenant}}"
    destinations:
      - namespace: "{{.metadata.tenant}}"
        name: in-cluster

namespaceDefaults:
  name: "{{.metadata.tenant}}-{{.id}}"

  networkPolicies:
    default-deny-all:
      enabled: false
      podSelector: {}
      policyTypes:
        - Ingress
        - Egress
    default-allow-all:
      enabled: false
      podSelector: {}
      ingress:
        - {}
      egress:
        - {}
      policyTypes:
        - Ingress
        - Egress
    default-allow-dns:
      enabled: false
      podSelector: {}
      policyTypes:
        - Egress
      egress:
        - to:
            - namespaceSelector:
                matchLabels:
                  kubernetes.io/metadata.name: kube-system
              podSelector:
                matchLabels:
                  k8s-app: kube-dns
          ports:
            - protocol: UDP
              port: 53

  resourceQuotas:
    compute-resources:
      enabled: false
      hard:
        requests.cpu: "1"
        requests.memory: "1Gi"
        limits.cpu: "2"
        limits.memory: "2Gi"
    object-counts:
      enabled: false
      hard:
        configmaps: "10"
        persistentvolumeclaims: "4"
        pods: "4"
        replicationcontrollers: "20"
        secrets: "10"
        services: "10"
        services.loadbalancers: "2"

  limitRanges:
    compute-resources:
      enabled: false
      limits:
      - defaultRequest:
          cpu: 100m
          memory: 100Mi
        default:
          cpu: 100m
          memory: 100Mi
        type: Container

namespaces:
  main:
    name: "{{.metadata.tenant}}"

applicationDefaults:
  project: "{{.metadata.tenant}}"
  deletion:
    cascade: true
  destination:
    name: in-cluster
    namespace: "{{.metadata.tenant}}"
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
  sourcesObject:
    main:
      helm:
        ignoreMissingValueFiles: true
        valueFiles:
          - $values/{{.id}}/values.yaml
          - $values/{{.id}}/values-type-{{.metadata.clusterType}}.yaml
          - $values/{{.id}}/values-{{.metadata.clusterId}}.yaml
    extras:
      enabled: false
      repoURL: git@github.com:tombulled/k8s.git
      path: charts/extras
      targetRevision: main
      helm:
        ignoreMissingValueFiles: true
        valueFiles:
          - $values/{{.id}}/values.yaml
          - $values/{{.id}}/values-type-{{.metadata.clusterType}}.yaml
          - $values/{{.id}}/values-{{.metadata.clusterId}}.yaml
    # common:
    #   enabled: false
    #   repoURL: https://github.com/tombulled/charts
    #   path: common
    #   targetRevision: HEAD
    #   helm:
    #     ignoreMissingValueFiles: true
    #     valueFiles:
    #       - $values/{{.id}}/values.yaml
    #       - $values/{{.id}}/values-type-{{.metadata.clusterType}}.yaml
    #       - $values/{{.id}}/values-{{.metadata.clusterId}}.yaml
    values:
      repoURL: git@github.com:tombulled/values.git
      targetRevision: main

applicationSetDefaults:
  name: "{{.metadata.tenant}}-{{.id}}"
  template:
    spec:
      project: "{{.metadata.tenant}}"

applicationSets:
  main:
    name: "{{.metadata.tenant}}"
    generatorsObject:
      main:
        x-git:
          repoURL: git@github.com:tombulled/k8s.git
          revision: HEAD
          path: "apps/{{.metadata.tenant}}/*"
          valueFiles:
            - values.yaml
            - values-type-{{.metadata.clusterType}}.yaml
            - values-{{.metadata.clusterId}}.yaml
        selector:
          matchExpressions:
            - key: enabled
              operator: NotIn
              values:
                - "false"
