metadata:
  tenant: ~ # populated by appset

projectDefaults:
  namePrefix: "{{.tenant}}"
  finalizers:
    # Finalizer that ensures that project is not deleted until it is not referenced by any application
    - resources-finalizer.argocd.argoproj.io
  sourceRepos:
    - "*" # git@github.com:tombulled/k8s.git?
  # destinations: []
  # clusterResourceWhitelist: []
  # namespaceResourceBlacklist: []
  # namespaceResourceWhitelist: []
  # roles: []
  # syncWindows: []
  # sourceNamespaces: []

projects:
  main:
    namePrefix: ~
    name: "{{.tenant}}"
    destinations:
      - namespace: "{{.tenant}}"
        name: in-cluster

namespaceDefaults:
  namePrefix: "{{.tenant}}"

namespaces:
  main:
    namePrefix: ~
    name: "{{.tenant}}"

applicationDefaults:
  namePrefix: "{{.tenant}}"
  project: "{{.tenant}}"
  deletion:
    cascade: true
  destination:
    name: in-cluster
    namespace: "{{.tenant}}"
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
  sourcesObject:
    values:
      repoURL: git@github.com:tombulled/k8s.git
      targetRevision: main
      ref: values

applicationSetDefaults:
  namePrefix: "{{.tenant}}"
  template:
    spec:
      project: "{{.tenant}}"

applicationSets:
  main:
    namePrefix: ~
    name: "{{.tenant}}"
