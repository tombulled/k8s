projectDefaults:
  namePrefix: ~

namespaceDefaults:
  namePrefix: ~

projects:
  main:
    destinations: # TODO: Infer me from .namespaces?
      - namespace: ingress-nginx
        name: in-cluster
      - namespace: argocd
        name: in-cluster
    clusterResourceWhitelist:
      - group: rbac.authorization.k8s.io
        kind: ClusterRole
      - group: rbac.authorization.k8s.io
        kind: ClusterRoleBinding
      - group: admissionregistration.k8s.io
        kind: ValidatingWebhookConfiguration
      - group: networking.k8s.io
        kind: IngressClass
      - group: apiextensions.k8s.io
        kind: CustomResourceDefinition

namespaces:
  main: ~
  ingress-nginx: {}
  # argocd: {}

applicationSets:
  main:
    # generators:
    #   - git:
    #       repoURL: git@github.com:tombulled/k8s.git
    #       revision: main
    #       files:
    #         - path: "apps/{{.tenant}}/*.yaml"
    generators:
      - merge:
          mergeKeys:
            - mergeKey
          generators:
            - git:
                repoURL: git@github.com:tombulled/k8s.git
                revision: HEAD
                files:
                  - path: "apps/{{.tenant}}/*/values.yaml"
                values:
                  mergeKey: '{{ "{{ $_ := set . \"mergeKey\" .path.path }}" }}'
            - git:
                repoURL: git@github.com:tombulled/k8s.git
                revision: HEAD
                files:
                  - path: "apps/{{.tenant}}/*/values-type-dev.yaml"
                values:
                  mergeKey: '{{ "{{ $_ := set . \"mergeKey\" .path.path }}" }}'
            - git:
                repoURL: git@github.com:tombulled/k8s.git
                revision: HEAD
                files:
                  - path: "apps/{{.tenant}}/*/values-t1-dev.yaml"
                values:
                  mergeKey: '{{ "{{ $_ := set . \"mergeKey\" .path.path }}" }}'
        selector:
          matchExpressions:
            - key: enabled
              operator: NotIn
              values:
                - "false"
