# projectDefaults:
#   namePrefix: ~

projects:
  main:
    destinations: # TODO: Infer me from .namespaces
      - namespace: ingress-nginx
        name: in-cluster
      - namespace: argocd
        name: in-cluster
    clusterResourceWhitelist:
      - group: rbac.authorization.k8s.io
        kind: ClusterRole
      - group: rbac.authorization.k8s.io
        kind: ClusterRoleBinding
      - group: admissionregistration.k8s.io
        kind: ValidatingWebhookConfiguration
      - group: networking.k8s.io
        kind: IngressClass
      - group: apiextensions.k8s.io
        kind: CustomResourceDefinition

namespaceDefaults:
  namePrefix: ~

namespaces:
  # TODO: Disable main namespace
  ingress-nginx: {}
  argocd: {}

app-of-apps: # extra source so 'app-of-apps' prefix not needed?
  applicationDefaults:
    project: core # TODO: This shouldn't need to be here!
  applicationSetDefaults:
    template:
      spec:
        project: core # TODO: This shouldn't need to be here!
  applicationSets:
    core:
      generators:
        - git:
            repoURL: git@github.com:tombulled/k8s.git
            revision: main
            files:
              - path: "apps/core/*.yaml"

