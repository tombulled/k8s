applicationSets:
  main:
    generators:
      - git:
          repoURL: git@github.com:tombulled/k8s.git
          revision: main
          files:
            - path: "apps/{{.tenant}}/type-all/*.yaml"
            - path: "apps/{{.tenant}}/type-dev/*.yaml"
            - path: "apps/{{.tenant}}/t1-dev/*.yaml"
