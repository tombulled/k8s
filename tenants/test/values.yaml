applicationSets:
  main:
    # generators:
    #   - git:
    #       repoURL: git@github.com:tombulled/k8s.git
    #       revision: main
    #       files:
    #         - path: "apps/{{.tenant}}/type-all/*.yaml"
    #         - path: "apps/{{.tenant}}/type-{{.clusterType}}/*.yaml"
    #         - path: "apps/{{.tenant}}/{{.clusterId}}/*.yaml"
    generators:
      - merge:
          mergeKeys:
            - mergeKey
          generators:
            - git:
                repoURL: git@github.com:tombulled/k8s.git
                revision: HEAD
                files:
                  - path: "apps/{{.tenant}}/*/values.yaml"
                values:
                  mergeKey: '{{ "{{ $_ := set . \"mergeKey\" .path.path }}" }}'
            - git:
                repoURL: git@github.com:tombulled/k8s.git
                revision: HEAD
                files:
                  - path: "apps/{{.tenant}}/*/values-type-dev.yaml"
                values:
                  mergeKey: '{{ "{{ $_ := set . \"mergeKey\" .path.path }}" }}'
            - git:
                repoURL: git@github.com:tombulled/k8s.git
                revision: HEAD
                files:
                  - path: "apps/{{.tenant}}/*/values-t1-dev.yaml"
                values:
                  mergeKey: '{{ "{{ $_ := set . \"mergeKey\" .path.path }}" }}'
        selector:
          matchExpressions:
            - key: enabled
              operator: NotIn
              values:
                - "false"
